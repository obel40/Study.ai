<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flashcards</title>
<style>
  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent: #7f5af0;
    --good: #2cb67d;
    --bad: #ef4565;
    --text: #fffffe;
    --muted: #94a1b2;
    --card: #16161a;
    --card-2: #242629;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-size: 400% 400%;
    animation: bgshift 20s ease infinite;
    overflow: hidden;
  }

  @keyframes bgshift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 24px;
    max-width: 720px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .title {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #fff, #c9b8ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .controls { display: flex; gap: 10px; align-items: center; }

  .pill {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .pill:hover { background: rgba(255, 255, 255, 0.16); transform: translateY(-1px); }
  .pill:active { transform: translateY(0); }
  .pill.active { background: var(--accent); border-color: var(--accent); }

  .progress-wrap {
    height: 4px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #c9b8ff);
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    width: 0%;
  }

  .stage {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    position: absolute;
    width: 100%;
    max-width: 520px;
    aspect-ratio: 3 / 4;
    max-height: 70vh;
    border-radius: 24px;
    cursor: pointer;
    will-change: transform, opacity;
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    padding: 32px;
    box-shadow:
      0 30px 60px -15px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.06) inset;
    overflow: hidden;
    background: linear-gradient(135deg, #2a2547, #1a1730);
    transform: scaleX(1);
    transition: transform 0.28s ease;
  }
  .card.showing-def .face {
    background: linear-gradient(135deg, #3d2b6b, #1f1545);
  }
  .card.flipping .face {
    transform: scaleX(0);
  }

  .face::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(127, 90, 240, 0.25), transparent 50%);
    pointer-events: none;
  }

  .face-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
    z-index: 1;
  }

  .face-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 600;
    line-height: 1.3;
    z-index: 1;
    word-break: break-word;
  }

  .hint {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    z-index: 1;
  }

  .actions {
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 24px 0 8px;
  }

  .action-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.6rem;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.6);
  }
  .action-btn:hover { transform: translateY(-3px) scale(1.05); }
  .action-btn:active { transform: translateY(0) scale(0.96); }

  .btn-x {
    background: linear-gradient(135deg, #ef4565, #c2185b);
  }
  .btn-x:hover { box-shadow: 0 14px 30px -10px rgba(239, 69, 101, 0.7); }

  .btn-check {
    background: linear-gradient(135deg, #2cb67d, #0f9b6c);
  }
  .btn-check:hover { box-shadow: 0 14px 30px -10px rgba(44, 182, 125, 0.7); }

  /* Swipe-out animations */
  .swipe-right {
    animation: swipeRight 0.55s cubic-bezier(0.55, 0.08, 0.68, 0.28) forwards;
  }
  .swipe-left {
    animation: swipeLeft 0.55s cubic-bezier(0.55, 0.08, 0.68, 0.28) forwards;
  }
  @keyframes swipeRight {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(150%, -10%) rotate(25deg); opacity: 0; }
  }
  @keyframes swipeLeft {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(-150%, -10%) rotate(-25deg); opacity: 0; }
  }

  .enter {
    animation: enterIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes enterIn {
    0%   { transform: translateY(40px) scale(0.92); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    z-index: 1;
  }
  .empty h2 {
    color: var(--text);
    margin-bottom: 12px;
    font-size: 1.4rem;
  }
  .empty .pill { margin-top: 18px; }

  .badge {
    display: inline-block;
    background: rgba(239, 69, 101, 0.18);
    color: #ff8aa0;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 0.75rem;
    margin-left: 6px;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(14px);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 0.9rem;
    border: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    z-index: 50;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .app { padding: 16px; }
    .title { font-size: 1.2rem; }
    .pill { font-size: 0.78rem; padding: 7px 12px; }
    .action-btn { width: 56px; height: 56px; font-size: 1.4rem; }
    .actions { gap: 20px; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">Flashcards</div>
      <div class="controls">
        <button class="pill" id="shuffleBtn" title="Random order">🔀 Shuffle</button>
        <button class="pill" id="reviewBtn" title="Review skipped">↺ Skipped <span class="badge" id="skipCount">0</span></button>
      </div>
    </div>

    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>

    <div class="stage" id="stage"></div>

    <div class="actions">
      <button class="action-btn btn-x" id="xBtn" title="Skip">✕</button>
      <button class="action-btn btn-check" id="checkBtn" title="Got it">✓</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const stage = document.getElementById('stage');
  const progress = document.getElementById('progress');
  const skipCountEl = document.getElementById('skipCount');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const reviewBtn = document.getElementById('reviewBtn');
  const xBtn = document.getElementById('xBtn');
  const checkBtn = document.getElementById('checkBtn');
  const toast = document.getElementById('toast');

  let cards = [];        // [{term, def}]
  let queue = [];        // indices into cards still to show this round
  let skipped = [];      // indices skipped this round
  let cursor = 0;        // position in queue
  let total = 0;         // for progress bar
  let busy = false;
  let mode = 'all';      // 'all' or 'review'

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function parseLines(text) {
    return text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
  }

  async function loadData() {
    try {
      const [t, d] = await Promise.all([
        fetch('terms.txt').then(r => r.text()),
        fetch('def.txt').then(r => r.text()),
      ]);
      const terms = parseLines(t);
      const defs = parseLines(d);
      const n = Math.min(terms.length, defs.length);
      cards = [];
      for (let i = 0; i < n; i++) cards.push({ term: terms[i], def: defs[i] });
      if (terms.length !== defs.length) {
        showToast(`⚠ ${terms.length} terms vs ${defs.length} defs — using ${n}`);
      }
    } catch (e) {
      cards = [];
      renderEmpty(`Couldn't load terms.txt / def.txt.<br/>Serve this folder over HTTP (e.g. <code>python -m http.server</code>) and reload.`);
      return false;
    }
    return true;
  }

  function startRound(indices) {
    queue = indices.slice();
    skipped = [];
    cursor = 0;
    total = queue.length;
    updateSkipBadge();
    renderCurrent();
  }

  function updateSkipBadge() {
    skipCountEl.textContent = skipped.length;
  }

  function updateProgress() {
    const pct = total === 0 ? 0 : (cursor / total) * 100;
    progress.style.width = pct + '%';
  }

  function renderEmpty(msg) {
    stage.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'empty';
    div.innerHTML = `<h2>${msg.includes('<') ? '' : '🎉 All done!'}</h2><div>${msg}</div>`;
    if (skipped.length > 0) {
      const btn = document.createElement('button');
      btn.className = 'pill active';
      btn.textContent = `Review ${skipped.length} skipped`;
      btn.onclick = () => reviewSkipped();
      div.appendChild(document.createElement('br'));
      div.appendChild(btn);
    }
    const restart = document.createElement('button');
    restart.className = 'pill';
    restart.textContent = '↻ Restart all';
    restart.style.marginLeft = '8px';
    restart.onclick = () => startRound(cards.map((_, i) => i));
    div.appendChild(restart);
    stage.appendChild(div);
    updateProgress();
  }

  function renderCurrent() {
    updateProgress();
    stage.innerHTML = '';
    if (cursor >= queue.length) {
      if (skipped.length > 0) {
        renderEmpty(`You skipped ${skipped.length} card${skipped.length === 1 ? '' : 's'}. Want another pass?`);
      } else {
        renderEmpty(`Nice work — every card cleared.`);
      }
      return;
    }
    const idx = queue[cursor];
    const c = cards[idx];

    const card = document.createElement('div');
    card.className = 'card enter';
    card.addEventListener('animationend', function onEnter(e) {
      if (e.animationName === 'enterIn') {
        card.classList.remove('enter');
        card.removeEventListener('animationend', onEnter);
      }
    });
    card.innerHTML = `
      <div class="face">
        <div class="face-label">Term</div>
        <div class="face-content"></div>
        <div class="hint">tap to flip</div>
      </div>
    `;
    const labelEl = card.querySelector('.face-label');
    const contentEl = card.querySelector('.face-content');
    const hintEl = card.querySelector('.hint');
    contentEl.textContent = c.term;

    let showingDef = false;
    let flipping = false;
    card.addEventListener('click', () => {
      if (busy || flipping) return;
      flipping = true;
      card.classList.add('flipping');
      setTimeout(() => {
        showingDef = !showingDef;
        if (showingDef) {
          card.classList.add('showing-def');
          labelEl.textContent = 'Definition';
          contentEl.textContent = c.def;
          hintEl.textContent = 'tap to flip back';
        } else {
          card.classList.remove('showing-def');
          labelEl.textContent = 'Term';
          contentEl.textContent = c.term;
          hintEl.textContent = 'tap to flip';
        }
        card.classList.remove('flipping');
        setTimeout(() => { flipping = false; }, 280);
      }, 280);
    });

    stage.appendChild(card);
    stage._card = card;
  }

  function advance(direction) {
    if (busy) return;
    const card = stage._card;
    if (!card) return;
    busy = true;

    const isCheck = direction === 'right';
    if (!isCheck) {
      skipped.push(queue[cursor]);
      updateSkipBadge();
    }

    card.classList.remove('enter');
    card.classList.add(isCheck ? 'swipe-right' : 'swipe-left');

    setTimeout(() => {
      cursor++;
      busy = false;
      renderCurrent();
    }, 520);
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function reviewSkipped() {
    if (skipped.length === 0) {
      showToast('No skipped cards');
      return;
    }
    mode = 'review';
    showToast(`Reviewing ${skipped.length} skipped`);
    startRound(skipped);
  }

  // Wire up controls
  shuffleBtn.addEventListener('click', () => {
    if (cards.length === 0) return;
    mode = 'all';
    showToast('Shuffled');
    startRound(shuffle(cards.map((_, i) => i)));
  });

  reviewBtn.addEventListener('click', reviewSkipped);
  xBtn.addEventListener('click', () => advance('left'));
  checkBtn.addEventListener('click', () => advance('right'));

  // Keyboard: arrows + space to flip
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { e.preventDefault(); advance('right'); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); advance('left'); }
    else if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (stage._card && !busy) stage._card.classList.toggle('flipped');
    }
  });

  // Init
  (async () => {
    const ok = await loadData();
    if (ok && cards.length > 0) {
      startRound(cards.map((_, i) => i));
    } else if (ok) {
      renderEmpty('terms.txt and def.txt are empty. Add lines and reload.');
    }
  })();
</script>
</body>
</html>
